<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Report - XERO</title>
    <link rel="stylesheet" href="style1.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="p-4 md:p-10">

    <div id="nav-placeholder"></div>

    <main class="max-w-7xl mx-auto space-y-6 relative z-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-5">
            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="users" class="text-green-500 w-6 h-6"></i><p class="label-text">Team Count</p></div>
                <h3 class="amount-text orbitron" id="team-count">0</h3>
            </div></div>
            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="banknote" class="text-yellow-600 w-6 h-6"></i><p class="label-text">Total Earned</p></div>
                <h3 class="amount-text orbitron" id="total-earned">0.00</h3>
            </div></div>
            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="user-plus" class="text-yellow-500 w-6 h-6"></i><p class="label-text">Ref Bonus</p></div>
                <h3 class="amount-text orbitron" id="referral-earnings">0.00</h3>
            </div></div>
            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="layers" class="text-purple-500 w-6 h-6"></i><p class="label-text">Level Income</p></div>
                <h3 class="amount-text orbitron" id="level-earnings">0.00</h3>
            </div></div>
            <div class="premium-card"><div class="inner-content stat-box">
                <div class="flex items-center gap-3"><i data-lucide="medal" class="text-blue-500 w-6 h-6"></i><p class="label-text">Rank Bonus</p></div>
                <h3 class="amount-text orbitron" id="rank-earnings">0.00</h3>
            </div></div>
        </div>

        <div class="premium-card">
            <div class="inner-content !block py-8">
                <div class="flex justify-between items-center mb-8 px-4">
                    <h3 class="text-sm font-black orbitron uppercase italic text-yellow-500">Team Report</h3>
                    <select id="levelSelect" onchange="loadLevelData(this.value)" class="bg-black/50 text-yellow-500 font-black orbitron text-xs p-2 rounded-lg border border-white/10 outline-none">
                        <option value="1">Level 1</option><option value="2">Level 2</option><option value="3">Level 3</option>
                        <option value="4">Level 4</option><option value="5">Level 5</option>
                    </select>
                </div>
                <div class="overflow-x-auto">
                    <table class="luxury-table w-full">
                        <thead><tr class="text-left text-[10px] text-gray-500 uppercase"><th class="p-4">USER ADDRESS</th><th class="p-4">LEVEL</th><th class="p-4">STATUS</th></tr></thead>
                        <tbody id="team-table-body" class="text-gray-400"><tr><td colspan="3" class="p-10 text-center italic text-gray-600">Syncing Network...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
     <script src="components.js"></script>
    <script src="web3-handler.js"></script>
    
    <script>
    lucide.createIcons();

    async function loadReferralData() {
        // Wait till contract is initialized in web3-handler.js
        if (typeof window.contract === 'undefined') {
            setTimeout(loadReferralData, 500); 
            return;
        }

        try {
            const address = await window.signer.getAddress();
            console.log("Fetching for:", address);

            const user = await window.contract.users(address);
            const stats = await window.contract.userStats(address); 

            // IDs update karein
            document.getElementById('team-count').innerText = stats.teamCount.toString();
            
            // Stats object se total income calculate karein (Contract ke logic ke mutabik)
            const total = user.roiIncome.add(user.referralIncome).add(user.levelIncome).add(user.rankBonus);
            
            // Global 'format' function ka use karein jo web3-handler.js mein hai
            document.getElementById('total-earned').innerText = format(total);
            document.getElementById('referral-earnings').innerText = format(user.referralIncome); 
            document.getElementById('level-earnings').innerText = format(user.levelIncome);
            document.getElementById('rank-earnings').innerText = format(user.rankBonus);
            
            loadLevelData(1);
        } catch (err) { 
            console.error("Referral Data Load Error:", err); 
        }
    }

    async function loadLevelData(level) {
        const tableBody = document.getElementById('team-table-body');
        tableBody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-yellow-500">SYNCING LEVEL ${level}...</td></tr>`;
        
        try {
            const address = await window.signer.getAddress();
            const members = await window.contract.getLevelTeam(address, parseInt(level));
            
            if (!members || members.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-gray-600">No members at Level ${level}</td></tr>`;
                return;
            }

            let html = '';
            members.forEach(addr => {
                html += `<tr>
                    <td class="p-4 font-mono text-yellow-500">${addr.substring(0,6)}...${addr.substring(38)}</td>
                    <td class="p-4">Level ${level}</td>
                    <td class="p-4"><span class="status-badge">REGISTERED</span></td>
                </tr>`;
            });
            tableBody.innerHTML = html;
        } catch (err) { 
            console.error("Level Data Error:", err);
            tableBody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-red-500">Error Loading Data</td></tr>`; 
        }
    }

    // Load hone par function call karein
    window.addEventListener('load', () => setTimeout(loadReferralData, 1500));
</script>
    
</body>
</html>
